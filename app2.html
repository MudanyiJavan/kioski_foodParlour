<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box > * {
            border: 2px solid rgb(96 139 168);
            border-radius: 5px;
            background-color: rgb(96 139 168 / 0.2);
        }
        .box{
            display: flex;
            flex-direction: row;
            width: 500px;
            height: 130px;
            border: 2px dotted rgb(96 139 168);
            align-items: baseline; 
            justify-content: flex-start;
        }
        .last-box{
            margin-left: auto;
        }

    </style>
</head>
<body>
    <div class="box">
        <div>one</div>
        <div>two</div>
        <div class="last-box">three</div>
        <div>up for the next</div>
    </div>
</body>
</html>
