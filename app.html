<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .button{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: fixed;           /* Fixes it relative to the viewport/screen */
            top: 50%;                  /* Moves the top edge to the screen center */
            left: 50%;                 /* Moves the left edge to the screen center */
        }
        .popup, .pop_up{
        
            background-color: blue;
            display: none;             /* Starts hidden */
            position: fixed;           /* Fixes it relative to the viewport/screen */
            top: 50%;                  /* Moves the top edge to the screen center */
            left: 50%;                 /* Moves the left edge to the screen center */
            transform: translate(-50%, -50%); 

            flex-direction: column;
            justify-content: center;
            align-items: center;


        }

        .pop_up{
            background-color: blue;
            color: white;             /* Makes text readable against blue */
            z-index: 10; 
             width: 300px;
            padding: 20px;
            box-sizing: border-box;
        }
        .pop_up{
            background-color: grey;
            color: white;
            z-index: 20; 
            width: 300px;
            padding: 20px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
   
    <div class="popup" id="popup">
        <p>hello money</p>
        <p>come closer please</p>
        <button id="pop-thanks">send</button>
    </div>

    <div class="pop_up" id="final-popup">
        <p>thanks for your submission </p>
        <button id="close_final_popup">close</button>
    </div>

    <button class="button" id="open_popup">click me</button>


    <script>
        const open_popup_btn= document.getElementById("open_popup")
        const popup= document.getElementById("popup")
        const pop_thanks_btn= document.getElementById("pop-thanks")
        const final_popup= document.getElementById("final-popup")
        const close_final_popup_btn = document.getElementById("close_final_popup")

        open_popup_btn.addEventListener("click",()=>{
            popup.style.display = "block"
            open_popup_btn.style.display="none"
        })

        pop_thanks_btn.addEventListener("click", ()=>{
            final_popup.style.display="block"
        })
        close_final_popup_btn.addEventListener("click", ()=>{
            final_popup.style.display="none"
            popup.style.display = "none"
            open_popup_btn.style.display="flex"
        })

    </script>
</body>
</html>
